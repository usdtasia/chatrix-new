<!-- Shared article styles — included inline in each article -->
<style>
.article-hero { background: linear-gradient(135deg, #f0f4ff, #faf5ff); padding: 80px 0 60px; }
.article-hero .container { max-width: 760px; }
.article-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.article-cat { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--primary); background: var(--primary-light); padding: 4px 12px; border-radius: 100px; }
.article-date { font-size: 13px; color: var(--text-muted); }
.article-read { font-size: 13px; color: var(--text-muted); }
.article-hero h1 { font-size: clamp(28px, 4vw, 44px); font-weight: 800; line-height: 1.2; margin-bottom: 20px; letter-spacing: -1px; }
.article-hero .lead { font-size: 18px; color: var(--text-muted); line-height: 1.7; }
.article-body { padding: 64px 0 96px; }
.article-body .container { max-width: 760px; }
.article-body h2 { font-size: 26px; font-weight: 800; margin: 48px 0 16px; letter-spacing: -.5px; }
.article-body h3 { font-size: 20px; font-weight: 700; margin: 32px 0 12px; }
.article-body p { font-size: 16px; line-height: 1.8; margin-bottom: 20px; }
.article-body ul, .article-body ol { margin: 0 0 20px 24px; }
.article-body li { font-size: 16px; line-height: 1.8; margin-bottom: 8px; }
.article-body strong { font-weight: 700; }
.article-body a { color: var(--primary); }
.callout { background: var(--primary-light); border-left: 4px solid var(--primary); border-radius: 0 12px 12px 0; padding: 20px 24px; margin: 28px 0; }
.callout p { margin: 0; font-weight: 500; }
.stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; margin: 32px 0; text-align: center; }
.stat-box .big { font-size: 48px; font-weight: 800; color: var(--primary); }
.stat-box p { margin: 0; font-size: 15px; color: var(--text-muted); }
.article-cta { background: linear-gradient(135deg, var(--primary), #8b5cf6); border-radius: var(--radius-lg); padding: 48px; text-align: center; color: white; margin-top: 60px; }
.article-cta h3 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
.article-cta p { opacity: .85; margin-bottom: 24px; }
.article-cta .btn { background: white; color: var(--primary); padding: 14px 28px; border-radius: 12px; font-weight: 700; text-decoration: none; display: inline-block; }
.related-posts { padding: 64px 0; background: var(--bg2); }
.related-posts h2 { font-size: 24px; font-weight: 800; margin-bottom: 32px; }
[data-theme="dark"] .article-hero { background: linear-gradient(135deg, #1e1b4b, #1f2937); }
[data-theme="dark"] .callout { background: #312e81; border-color: var(--primary); }
[data-theme="dark"] .stat-box { background: #1f2937; border-color: #374151; }
</style>
